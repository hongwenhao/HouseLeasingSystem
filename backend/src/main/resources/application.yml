# ============================================================
# application.yml —— Spring Boot 主配置文件
# 定义所有环境共用的基础配置，敏感参数通过环境变量注入
# ============================================================

# 服务器端口配置
server:
  port: 8080  # 应用监听端口，前端代理 /api 请求转发到此端口

spring:
  # ---- 数据源配置（MySQL） ----
  datasource:
    # 支持通过环境变量 DB_URL 覆盖，默认连接本地 house_leasing 数据库
    url: ${DB_URL:jdbc:mysql://localhost:3306/house_leasing?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234561}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ---- Redis 缓存配置 ----
  redis:
    host: localhost
    port: 6379
    timeout: 5000ms  # 连接超时时间
    lettuce:
      pool:
        max-active: 8   # 最大活跃连接数
        max-idle: 8     # 最大空闲连接数
        min-idle: 0     # 最小空闲连接数
        max-wait: -1ms  # -1 表示无限等待

  # ---- RabbitMQ 消息队列配置 ----
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        auto-startup: false  # 默认不自动启动监听器，按需开启
    connection-timeout: 3000ms

  # ---- Spring MVC 路径匹配策略 ----
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher  # 兼容 springdoc swagger 的路径匹配

  # ---- Jackson JSON 序列化配置 ----
  jackson:
    time-zone: Asia/Shanghai           # 时间序列化使用上海时区
    date-format: yyyy-MM-dd HH:mm:ss  # 日期格式化模式
    serialization:
      write-dates-as-timestamps: false  # 日期以字符串输出，而非时间戳

# ---- MyBatis-Plus ORM 配置 ----
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true  # 数据库下划线字段名自动映射为驼峰命名
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 控制台输出 SQL 日志
  global-config:
    db-config:
      id-type: auto              # 主键策略：数据库自增
      logic-delete-field: deleted        # 逻辑删除字段名
      logic-delete-value: 1              # 已删除标记值
      logic-not-delete-value: 0         # 未删除标记值
  mapper-locations: classpath:mapper/*.xml  # XML 映射文件路径

# ---- JWT Token 配置 ----
jwt:
  # 签名密钥：生产环境必须通过 JWT_SECRET 环境变量设置强密钥
  secret: ${JWT_SECRET:HouseLeasingSystem2024SecretKey12345678901234567890}
  # Token 有效期（毫秒）：86400000 = 24小时，可通过 JWT_EXPIRATION 覆盖
  expiration: ${JWT_EXPIRATION:86400000}

# ---- SpringDoc/Swagger API 文档配置 ----
springdoc:
  api-docs:
    path: /api-docs       # OpenAPI JSON 文档路径
  swagger-ui:
    path: /swagger-ui.html  # Swagger UI 访问路径

# ---- 日志级别配置 ----
logging:
  level:
    com.houseleasing: debug          # 业务代码输出 DEBUG 级别日志
    org.springframework.security: warn  # Spring Security 只输出警告及以上
