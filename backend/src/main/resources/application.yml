# ============================================================
# application.yml —— Spring Boot 主配置文件
# 定义所有环境共用的基础配置，敏感参数通过环境变量注入
# ============================================================

# 服务器端口配置
server:
  port: 8080  # 应用监听端口，前端代理 /api 请求转发到此端口

spring:
  # ---- 数据源配置（MySQL） ----
  datasource:
    # 支持通过环境变量 DB_URL 覆盖，默认连接本地 house_leasing 数据库
    url: ${DB_URL:jdbc:mysql://localhost:3306/house_leasing?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ---- Redis 缓存配置 ----
  redis:
    host: localhost
    port: 6379
    timeout: 5000ms  # 连接超时时间
    lettuce:
      pool:
        max-active: 8   # 最大活跃连接数
        max-idle: 8     # 最大空闲连接数
        min-idle: 0     # 最小空闲连接数
        max-wait: -1ms  # -1 表示无限等待

  # ---- RabbitMQ 消息队列配置 ----
  rabbitmq:
    # 开发环境默认连接本机 RabbitMQ；生产环境建议通过环境变量注入主机与凭据
    host: localhost
    port: 5672
    username: guest
    # 留空表示使用 RabbitMQ 默认 guest 账户空密码（仅适合本地环境）
    # 生产环境务必配置强密码并限制网络访问
    password:
    virtual-host: /
    listener:
      simple:
        auto-startup: false  # 默认不自动启动监听器，按需开启
    connection-timeout: 3000ms

  # ---- Spring MVC 路径匹配策略 ----
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher  # 兼容 springdoc swagger 的路径匹配

  # ---- Jackson JSON 序列化配置 ----
  jackson:
    time-zone: Asia/Shanghai           # 时间序列化使用上海时区
    date-format: yyyy-MM-dd HH:mm:ss  # 日期格式化模式
    serialization:
      write-dates-as-timestamps: false  # 日期以字符串输出，而非时间戳

# ---- MyBatis-Plus ORM 配置 ----
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true  # 数据库下划线字段名自动映射为驼峰命名
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 控制台输出 SQL 日志
  global-config:
    db-config:
      id-type: auto              # 主键策略：数据库自增
      logic-delete-field: deleted        # 逻辑删除字段名
      logic-delete-value: 1              # 已删除标记值
      logic-not-delete-value: 0         # 未删除标记值
  mapper-locations: classpath:mapper/*.xml  # XML 映射文件路径

# ---- JWT Token 配置 ----
jwt:
  # 签名密钥：生产环境必须通过 JWT_SECRET 环境变量设置强密钥
  secret: ${JWT_SECRET:HouseLeasingSystemc2024SecretKey12345678901234567890}
  # Token 有效期（毫秒）：86400000 = 24小时，可通过 JWT_EXPIRATION 覆盖
  expiration: ${JWT_EXPIRATION:86400000}

# ---- SpringDoc/Swagger API 文档配置 ----
springdoc:
  api-docs:
    path: /api-docs       # OpenAPI JSON 文档路径
  swagger-ui:
    path: /swagger-ui.html  # Swagger UI 访问路径

# ---- 文件上传配置 ----
app:
  upload:
    # 图片上传根目录，默认为项目根目录下的 uploads 文件夹
    # 生产环境可通过环境变量 UPLOAD_DIR 覆盖为绝对路径（如 /data/uploads）
    dir: ${UPLOAD_DIR:uploads}

# ---- 日志级别配置 ----
logging:
  level:
    com.houseleasing: debug          # 业务代码输出 DEBUG 级别日志
    org.springframework.security: warn  # Spring Security 只输出警告及以上

# ---- 支付宝（沙箱）配置：仅同步回调方案 ----
# 注意：
# 1) 本项目按需求仅使用同步回调（return_url），不接入异步 notify_url；
# 2) 推荐通过环境变量覆盖密钥，避免明文写入仓库；
# 3) FRONTEND_BASE_URL 默认指向本地前端地址，可按部署环境调整；
# 4) return-url 必须是前端“支付宝回跳页”完整地址，若配置错误会导致支付后无法回到系统页面。
alipay:
  # 下面 app-id/private-key/public-key 为沙箱示例值，生产环境请统一改为环境变量注入
  app-id: 9021000162658843
  private-key: 
  public-key: 
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  charset: utf-8
  sign-type: RSA2
  timeout-express: 20m
  # 支付完成后支付宝同步回跳到前端页面（支持环境变量覆盖，避免多环境手工改配置）
  return-url: ${ALIPAY_RETURN_URL:${FRONTEND_BASE_URL:http://localhost:5173}/payment/alipay/return}
